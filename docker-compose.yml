services:
  tmpdrop:
    build: .
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      PUBLIC_BASE: ${PUBLIC_BASE:-http://localhost:3000}
      MAX_BYTES: ${MAX_BYTES:-26214400}
    volumes:
      - ${STORAGE_DIR:-./data}/uploads:/data/uploads
      - ${STORAGE_DIR:-./data}/db:/data/db
